<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Address Autocomplete Widget</title>
  <script src="//js.jotform.com/JotFormCustomWidget.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 14px;
      color: #2c3345;
      background: transparent;
      padding: 4px;
    }

    .widget-container {
      width: 100%;
      max-width: 100%;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      color: #2c3345;
    }

    /* The PlaceAutocompleteElement is a Web Component — it owns its own
       input and dropdown via shadow DOM. We can only style the host. */
    #autocomplete-host {
      width: 100%;
      display: block;
    }

    gmp-place-autocomplete {
      width: 100%;
      display: block;
    }

    .status {
      margin-top: 6px;
      font-size: 12px;
      min-height: 16px;
    }

    .status.success { color: #2dad11; }
    .status.error   { color: #f23a3c; }
    .status.info    { color: #6f76a7; }
  </style>
</head>
<body>
  <div class="widget-container">
    <label for="autocomplete-host">Search for an address</label>
    <div id="autocomplete-host"></div>
    <div id="status" class="status"></div>
  </div>

  <script type="text/javascript">
    (function () {
      'use strict';

      // Settings populated inside `ready`
      var GOOGLE_API_KEY   = '';
      var TARGET_QID       = '';
      var COUNTRY_RESTRICT = '';
      var DEFAULT_COUNTRY  = '';

      var statusEl   = document.getElementById('status');
      var hostEl     = document.getElementById('autocomplete-host');
      var pacElement = null; // the <gmp-place-autocomplete> instance

      function setStatus(msg, type) {
        statusEl.textContent = msg || '';
        statusEl.className = 'status' + (type ? ' ' + type : '');
      }

      // Find a component by type in the new addressComponents array.
      // Each component has { types, longText, shortText }.
      function getComponent(components, type, useShort) {
        for (var i = 0; i < components.length; i++) {
          if (components[i].types && components[i].types.indexOf(type) !== -1) {
            return useShort ? components[i].shortText : components[i].longText;
          }
        }
        return '';
      }

      function buildAddressFromPlace(place) {
        var c = place.addressComponents || [];

        var streetNumber = getComponent(c, 'street_number');
        var route        = getComponent(c, 'route');
        var subpremise   = getComponent(c, 'subpremise');

        var line1 = (streetNumber + ' ' + route).trim();
        if (!line1) line1 = place.displayName || place.formattedAddress || '';

        var line2 = subpremise ? ('Unit ' + subpremise) : '';

        var city = getComponent(c, 'locality')
                || getComponent(c, 'postal_town')
                || getComponent(c, 'sublocality')
                || getComponent(c, 'sublocality_level_1')
                || getComponent(c, 'administrative_area_level_2');

        var state   = getComponent(c, 'administrative_area_level_1', true);
        var postal  = getComponent(c, 'postal_code');
        var country = getComponent(c, 'country');

        return {
          addr_line1: line1,
          addr_line2: line2,
          city:      city,
          state:     state,
          postal:    postal,
          country:   country
        };
      }

      function populateAddressField(addr) {
        if (!TARGET_QID) {
          setStatus('No target question ID configured.', 'error');
          return;
        }

        try {
          var fields = {
            addr_line1: addr.addr_line1 || '',
            addr_line2: addr.addr_line2 || '',
            city:       addr.city       || '',
            state:      addr.state      || '',
            postal:     addr.postal     || '',
            country:    addr.country    || DEFAULT_COUNTRY || ''
          };

          JFCustomWidget.setFieldsValueById(TARGET_QID, fields);

          var oneLine = [
            addr.addr_line1,
            addr.addr_line2,
            addr.city,
            addr.state,
            addr.postal,
            addr.country
          ].filter(Boolean).join(', ');

          JFCustomWidget.sendData({ value: oneLine, valid: true });

          setStatus('Address populated ✓', 'success');
        } catch (err) {
          console.error('populateAddressField error:', err);
          setStatus('Could not populate the address field.', 'error');
        }
      }

      async function initAutocomplete() {
        try {
          // Load the places library on demand
          await google.maps.importLibrary('places');

          var options = {};
          if (COUNTRY_RESTRICT) {
            // New API: includedRegionCodes (array of ISO codes), max 15
            options.includedRegionCodes = COUNTRY_RESTRICT
              .split(',')
              .map(function (s) { return s.trim().toLowerCase(); })
              .filter(Boolean)
              .slice(0, 15);
          }

          pacElement = new google.maps.places.PlaceAutocompleteElement(options);
          pacElement.id = 'address-search';
          hostEl.appendChild(pacElement);

          pacElement.addEventListener('gmp-select', async function (ev) {
            try {
              var prediction = ev.placePrediction;
              if (!prediction) {
                setStatus('Please pick an address from the list.', 'error');
                return;
              }
              var place = prediction.toPlace();
              await place.fetchFields({
                fields: ['addressComponents', 'formattedAddress', 'displayName']
              });
              var addr = buildAddressFromPlace(place);
              populateAddressField(addr);
            } catch (err) {
              console.error('gmp-select handler error:', err);
              setStatus('Could not retrieve address details.', 'error');
            }
          });

          setStatus('');
        } catch (err) {
          console.error('initAutocomplete error:', err);
          setStatus('Google Maps failed to load.', 'error');
        }
      }

      // Bootstrap loader (Google's recommended inline pattern)
      // See: https://developers.google.com/maps/documentation/javascript/load-maps-js-api
      function loadGoogleMaps() {
        if (!GOOGLE_API_KEY) {
          setStatus('Google API key is missing in widget settings.', 'error');
          return;
        }

        if (window.google && window.google.maps && window.google.maps.importLibrary) {
          initAutocomplete();
          return;
        }

        (g => {
          var h, a, k, p = "The Google Maps JavaScript API",
              c = "google", l = "importLibrary", q = "__ib__",
              m = document, b = window;
          b = b[c] || (b[c] = {});
          var d = b.maps || (b.maps = {}),
              r = new Set(),
              e = new URLSearchParams(),
              u = () => h || (h = new Promise(async (f, n) => {
                a = m.createElement("script");
                e.set("libraries", [...r] + "");
                for (k in g) e.set(
                  k.replace(/[A-Z]/g, t => "_" + t[0].toLowerCase()),
                  g[k]
                );
                e.set("callback", c + ".maps." + q);
                a.src = "https://maps." + c + "apis.com/maps/api/js?" + e;
                d[q] = f;
                a.onerror = () => h = n(Error(p + " could not load."));
                a.nonce = m.querySelector("script[nonce]")?.nonce || "";
                m.head.append(a);
              }));
          d[l] ? console.warn(p + " only loads once. Ignoring:", g)
               : d[l] = (f, ...n) => r.add(f) && u().then(() => d[l](f, ...n));
        })({
          key: GOOGLE_API_KEY,
          v: 'weekly'
        });

        initAutocomplete();
      }

      // Always subscribe to ready event — best practice per Jotform docs
      JFCustomWidget.subscribe('ready', function () {
        GOOGLE_API_KEY = JFCustomWidget.getWidgetSetting('googleApiKey') || '';
        var qidRaw     = JFCustomWidget.getWidgetSetting('addressQuestionId') || '';
        COUNTRY_RESTRICT = (JFCustomWidget.getWidgetSetting('countryRestriction') || '').trim();
        DEFAULT_COUNTRY  = (JFCustomWidget.getWidgetSetting('defaultCountry')     || '').trim();

        // Accept "5", "#5", or "input_5" — extract digits only
        TARGET_QID = (qidRaw.match(/\d+/) || [''])[0];

        loadGoogleMaps();

        try {
          JFCustomWidget.requestFrameResize({ height: document.body.scrollHeight + 20 });
        } catch (e) { /* older runtimes */ }

        // Subscribe to form submit event
        JFCustomWidget.subscribe('submit', function () {
          var currentValue = '';
          try {
            currentValue = (pacElement && pacElement.value) || '';
          } catch (e) { currentValue = ''; }

          var msg = {
            valid: true,
            value: currentValue
          };
          JFCustomWidget.sendSubmit(msg);
        });
      });
    })();
  </script>
</body>
</html>
